<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Resume | Curriculum Vitae of José Federico Castro Tramontina"
    >

    <title>José Federico Castro Tramontina</title>

    <style>

        :root
        {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #222222;
            --accent: #1f4e79;
            --border: #dddddd;
        }

        *
        {
            box-sizing: border-box;
        }

        body
        {
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;

            font-family: Arial, Helvetica, sans-serif;

            background: var(--bg);
            color: var(--text);
        }

        .card
        {
            width: min(92%, 520px);

            padding: 48px;

            text-align: center;

            background: var(--card);

            border: 1px solid var(--border);
            border-radius: 12px;

            box-shadow: 0 8px 30px rgba(0, 0, 0, .08);

            transition:
                transform .15s ease,
                box-shadow .15s ease;
        }

        .card:hover
        {
            transform: translateY(-2px);

            box-shadow: 0 12px 36px rgba(0, 0, 0, .10);
        }

        h1
        {
            margin: 0;

            font-size: 2rem;

            color: var(--accent);
        }

        h1 + h1
        {
            margin-bottom: 2rem;
        }

        h2
        {
            margin: 0 0 2.5rem 0;

            font-size: 1.15rem;
            font-weight: normal;

            color: #666666;
        }

        .button
        {
            display: block;

            margin: 16px 0;
            padding: 16px;

            text-decoration: none;

            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: .4px;

            color: white;
            background: var(--accent);

            border-radius: 8px;

            transition:
                background .2s ease,
                transform .15s ease;
        }

        .button:hover
        {
            background: #163b5c;

            transform: translateY(-1px);
        }

        .footer
        {
            margin-top: 2rem;

            font-size: .9rem;

            color: #777777;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>
            José Federico
        </h1>

        <h1>
            Castro Tramontina
        </h1>

        <h2>
            Resume │ Curriculum Vitae
        </h2>

        <a
            class="button"
            href="index_en.html"
        >
            English
        </a>

        <a
            class="button"
            href="index_es.html"
        >
            Español
        </a>

        <div class="footer">
            Discrete Mathematics • Cryptography • AI • Computational Mathematics
        </div>

    </div>

</body>

</html>
